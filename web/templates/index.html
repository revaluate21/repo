<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quant Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-4 space-y-4">
    <header class="flex items-center justify-between border-b border-slate-700 pb-3">
      <h1 class="text-2xl font-bold tracking-tight">⚡ Local Quant Trading Terminal</h1>
      <div class="text-sm text-slate-400" id="ws-status">WS Connecting...</div>
    </header>

    <div class="bg-red-900/50 border border-red-500 rounded p-3 text-sm">
      <strong>WARNING:</strong> Local only. Never deploy publicly. We do not store private keys.
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
      <div class="lg:col-span-3 space-y-4">
        <section id="status-panel" hx-get="/partials/status" hx-trigger="load, every 2s" hx-swap="innerHTML"></section>

        <section class="bg-slate-900 border border-slate-700 rounded p-4">
          <h2 class="font-semibold mb-3">Controls</h2>
          <div class="grid md:grid-cols-2 gap-4">
            <form hx-post="/api/start" hx-swap="none" class="space-y-2">
              <label class="block text-xs text-slate-400">Live mode confirmation phrase</label>
              <input name="confirmation" class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1" placeholder="I UNDERSTAND I CAN LOSE EVERYTHING" />
              <label class="inline-flex gap-2 items-center"><input type="checkbox" name="live" value="true"/>Enable Live</label>
              <button class="bg-emerald-600 hover:bg-emerald-500 px-3 py-2 rounded">Start Bot</button>
            </form>
            <div class="space-y-2">
              <form hx-post="/api/stop" hx-swap="none"><button class="bg-rose-700 hover:bg-rose-600 px-3 py-2 rounded">Stop Bot</button></form>
              <form hx-post="/api/pause" hx-swap="none" class="flex gap-2 items-center">
                <select name="value" class="bg-slate-800 border border-slate-600 rounded px-2 py-1"><option value="true">Pause</option><option value="false">Resume</option></select>
                <button class="bg-amber-600 hover:bg-amber-500 px-3 py-2 rounded">Apply</button>
              </form>
            </div>
          </div>
        </section>

        <section class="bg-slate-900 border border-slate-700 rounded p-4">
          <h2 class="font-semibold mb-2">Wallet Connect (memory only)</h2>
          <form hx-post="/api/wallet" hx-swap="none" class="grid md:grid-cols-2 gap-3">
            <input name="private_key" type="password" class="bg-slate-800 border border-slate-600 rounded px-2 py-1" placeholder="Polygon private key" />
            <input name="mnemonic" type="password" class="bg-slate-800 border border-slate-600 rounded px-2 py-1" placeholder="Mnemonic phrase" />
            <button class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded md:col-span-2">Connect Wallet</button>
          </form>
        </section>

        <section class="bg-slate-900 border border-slate-700 rounded p-4">
          <h2 class="font-semibold mb-2">Strategies</h2>
          <div class="grid md:grid-cols-5 gap-2 text-sm">
            <form hx-post="/api/strategy" hx-swap="none" class="flex gap-2 items-center"><input type="hidden" name="name" value="micro_arb"><select name="enabled" class="bg-slate-800 border border-slate-600 rounded px-1"><option value="true">ON</option><option value="false">OFF</option></select><button class="bg-slate-700 rounded px-2 py-1">micro_arb</button></form>
            <form hx-post="/api/strategy" hx-swap="none" class="flex gap-2 items-center"><input type="hidden" name="name" value="bucket_momentum"><select name="enabled" class="bg-slate-800 border border-slate-600 rounded px-1"><option value="true">ON</option><option value="false">OFF</option></select><button class="bg-slate-700 rounded px-2 py-1">bucket</button></form>
            <form hx-post="/api/strategy" hx-swap="none" class="flex gap-2 items-center"><input type="hidden" name="name" value="lp_maker"><select name="enabled" class="bg-slate-800 border border-slate-600 rounded px-1"><option value="true">ON</option><option value="false">OFF</option></select><button class="bg-slate-700 rounded px-2 py-1">lp</button></form>
            <form hx-post="/api/strategy" hx-swap="none" class="flex gap-2 items-center"><input type="hidden" name="name" value="sentiment"><select name="enabled" class="bg-slate-800 border border-slate-600 rounded px-1"><option value="true">ON</option><option value="false">OFF</option></select><button class="bg-slate-700 rounded px-2 py-1">sentiment</button></form>
            <form hx-post="/api/strategy" hx-swap="none" class="flex gap-2 items-center"><input type="hidden" name="name" value="convergence"><select name="enabled" class="bg-slate-800 border border-slate-600 rounded px-1"><option value="true">ON</option><option value="false">OFF</option></select><button class="bg-slate-700 rounded px-2 py-1">convergence</button></form>
          </div>
        </section>
      </div>

      <div class="space-y-4">
        <section class="bg-slate-900 border border-slate-700 rounded p-4">
          <h3 class="font-semibold">Quick Manual Trade</h3>
          <form hx-post="/api/trade" hx-swap="none" class="space-y-2 mt-2">
            <select name="side" class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1"><option>BUY</option><option>SELL</option></select>
            <input name="price" type="number" step="0.0001" value="0.50" class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1"/>
            <input name="size" type="number" step="0.01" value="1" class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1"/>
            <button class="w-full bg-emerald-700 hover:bg-emerald-600 rounded px-3 py-2">Take</button>
          </form>
        </section>

        <section class="bg-slate-900 border border-slate-700 rounded p-4">
          <h3 class="font-semibold">Settings</h3>
          <form hx-post="/api/settings" hx-swap="none" class="space-y-2 mt-2">
            <input name="refresh_hz" type="number" value="5" class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1"/>
            <input name="fractional_kelly" type="number" step="0.01" value="0.25" class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1"/>
            <input name="max_balance_fraction_per_trade" type="number" step="0.01" value="0.25" class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1"/>
            <button class="w-full bg-indigo-700 hover:bg-indigo-600 rounded px-3 py-2">Save Runtime Settings</button>
          </form>
        </section>
      </div>
    </div>

    <section class="bg-slate-900 border border-slate-700 rounded p-4">
      <h2 class="font-semibold mb-2">Journal</h2>
      <div id="journal-panel" hx-get="/partials/journal" hx-trigger="load, every 3s" hx-swap="innerHTML"></div>
      <a href="/api/export-csv" class="inline-block mt-2 text-sky-300 hover:text-sky-200">Export CSV</a>
    </section>

    <section class="bg-slate-900 border border-slate-700 rounded p-4">
      <h2 class="font-semibold mb-2">Live Logs</h2>
      <pre id="live-logs" class="text-xs bg-slate-950 border border-slate-800 rounded p-3 h-48 overflow-auto"></pre>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
