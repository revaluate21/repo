<div class="overflow-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="text-left text-slate-400 border-b border-slate-700">
        <th class="py-2">Time</th><th>Symbol</th><th>Side</th><th>Price</th><th>Size</th><th>Mode</th><th>Note</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr class="border-b border-slate-800">
        <td class="py-2">{{ row.ts }}</td>
        <td>{{ row.symbol }}</td>
        <td class="{% if row.side == 'BUY' %}text-emerald-400{% else %}text-rose-400{% endif %}">{{ row.side }}</td>
        <td>{{ "%.4f"|format(row.price) }}</td>
        <td>{{ "%.2f"|format(row.size) }}</td>
        <td>{{ row.mode }}</td>
        <td>{{ row.note }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
